<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #060608; color: #e8e4dc; font-family: 'DM Mono', monospace; overflow: hidden; touch-action: manipulation; }

  /* two canvas layers — back and front */
  canvas { position: fixed; inset: 0; pointer-events: none; }
  #c-back  { z-index: 0; }
  #c-front { z-index: 20; }

  /* ── nav ── */
  #nav { position: fixed; top: 24px; right: 24px; z-index: 100; }
  #nav-toggle {
    background: transparent; border: 1px solid rgba(232,228,220,0.35); color: #e8e4dc;
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .12em;
    padding: 8px 18px; border-radius: 40px; cursor: pointer; transition: border-color .2s, background .2s;
    -webkit-tap-highlight-color: transparent;
  }
  #nav-toggle:hover { border-color: #e8e4dc; background: rgba(255,255,255,.05); }
  #nav-menu {
    display: none; position: absolute; right: 0; top: 44px;
    background: rgba(10,10,16,.96); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.1); border-radius: 14px; overflow: hidden; min-width: 180px;
  }
  #nav-menu.open { display: block; }
  #nav-menu a, #nav-menu button {
    display: block; width: 100%; text-align: left;
    padding: 14px 20px; color: #e8e4dc; text-decoration: none;
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em;
    border: none; border-bottom: 1px solid rgba(255,255,255,.06);
    background: transparent; cursor: pointer; transition: background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  #nav-menu a:last-child, #nav-menu button:last-child { border: none; }
  #nav-menu a:hover, #nav-menu button:hover { background: rgba(255,255,255,.07); }

  /* ── stage ── */
  #stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
  }

  /* ── ball wrapper ── */
  #ball {
    position: relative;
    width: 170px; height: 170px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  /* disco ball image — before click */
  #ball-disco {
    position: absolute; inset: 0;
    width: 170px; height: 170px;
    object-fit: contain;
    opacity: 1;
    transition: opacity .6s ease;
    animation: spin-ball 3s ease-in-out infinite; /* always swaying */
    transform-origin: center top;
    border-radius: 50%;
    overflow: hidden;
  }
  /* when active: ball fades out so photo shows */
  #ball.active #ball-disco {
    opacity: 0.01;
  }

  /* profile photo — fades in centred over the ball */
  #ball-photo {
    position: absolute;
    top: 50%; left: 50%;
    width: 130px; height: 130px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    object-fit: cover; object-position: center top;
    border: 2.5px solid rgba(200,184,255,.55);
    opacity: 0;
    transition: opacity .6s ease, box-shadow .9s ease;
    z-index: 2;
    pointer-events: none;
  }
  #ball.active #ball-photo {
    opacity: 1;
    box-shadow: 0 0 32px 10px rgba(200,184,255,.38), 0 0 80px 28px rgba(180,160,255,.16);
  }

  @keyframes spin-ball {
    0%   { transform: rotate(-18deg); }
    50%  { transform: rotate(18deg);  }
    100% { transform: rotate(-18deg); }
  }
  /* ── hint text ── */
  #hint {
    font-size: 10px; letter-spacing: .18em; color: rgba(232,228,220,0.35);
    text-transform: uppercase; text-align: center;
    transition: opacity .5s; white-space: nowrap;
    user-select: none;
  }
  #hint.hidden { opacity: 0; pointer-events: none; }

  /* ── try-it modal ── */
  #try-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 20px;
  }
  #try-overlay.open { display: flex; }
  #try-box {
    background: rgba(12,12,20,.96); border: 1px solid rgba(255,255,255,.15);
    border-radius: 18px; padding: 28px; width: min(480px, 100%);
    font-family: 'DM Mono', monospace; color: #e8e4dc;
  }
  #try-box h2 { font-size: 13px; letter-spacing: .12em; margin-bottom: 16px; color: rgba(200,184,255,.9); }
  #try-box label { display: block; font-size: 11px; letter-spacing: .1em; margin-bottom: 6px; color: rgba(232,228,220,.5); }
  #try-about, #try-skills {
    width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px; color: #e8e4dc; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 10px 12px; margin-bottom: 16px; resize: vertical; outline: none; transition: border-color .2s;
  }
  #try-about:focus, #try-skills:focus { border-color: rgba(200,184,255,.5); }
  #try-about { height: 72px; } #try-skills { height: 96px; }
  .try-hint { font-size: 10px; color: rgba(232,228,220,.3); margin-top: -12px; margin-bottom: 16px; }
  #try-actions { display: flex; gap: 10px; justify-content: flex-end; }
  #try-apply, #try-cancel {
    padding: 9px 20px; border-radius: 30px; font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: .1em; cursor: pointer; border: 1px solid rgba(255,255,255,.2);
    transition: background .2s, border-color .2s; -webkit-tap-highlight-color: transparent;
  }
  #try-apply { background: rgba(200,184,255,.15); color: rgba(200,184,255,.9); }
  #try-apply:hover { background: rgba(200,184,255,.28); border-color: rgba(200,184,255,.5); }
  #try-cancel { background: transparent; color: rgba(232,228,220,.4); }

  /* ── responsive: smaller on phones ── */
  @media (max-width: 480px) {
    #ball, #ball-disco { width: 140px; height: 140px }
    #ball-photo { width: 108px; height: 108px; }
  }

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
/* ── canvas setup ── */
const cBack  = document.getElementById('c-back');
const cFront = document.getElementById('c-front');
const ctxB   = cBack.getContext('2d');
const ctxF   = cFront.getContext('2d');
let W, H, CX, CY;

function resize(){
  W = cBack.width  = cFront.width  = innerWidth;
  H = cBack.height = cFront.height = innerHeight;
  CX = W/2; CY = H/2;
}
resize();
window.addEventListener('resize', resize);

/* ── state ── */
let DATA = null, lang = 'en', active = false, discoAngle = 0, spots = [];

/* ── spot builder — golden angle, well-spaced ── */
function buildSpots(items){
  /* cap at 18 items max so nothing crowds */
  const capped = items.slice(0, 18);
  spots = capped.map((text, i) => ({
    text,
    /* spread elevation more broadly so spots don't cluster at equator */
    phi:    (Math.PI * 0.15) + (i / capped.length) * Math.PI * 0.70,
    theta0: i * 2.399963,
    hue:    190 + (i * 23) % 110
  }));
}

/* ── 3-D projection ── */
function project(theta, phi, r){
  const x3 = r * Math.sin(phi) * Math.cos(theta);
  const y3 = r * Math.cos(phi);
  const z3 = r * Math.sin(phi) * Math.sin(theta);
  const tiltX = 0.30;
  const y2 = y3 * Math.cos(tiltX) - z3 * Math.sin(tiltX);
  const z2 = y3 * Math.sin(tiltX) + z3 * Math.cos(tiltX);
  const fov = 900, scale = fov / (fov + z2 + r);
  return { sx: CX + x3 * scale, sy: CY + y2 * scale, z: z2, scale };
}

/* ball radius in px (used to split front/back) */
function ballR(){ return Math.min(W, H) * 0.10; }
/* sphere radius — bigger = more spread */
function sphereR(){ return Math.min(W, H) * 0.42; }

function drawSpot(ctx2d, s, depth){
  const alpha    = 0.28 + depth * 0.70;
  const fontSize = Math.round(13 + s.scale * 7);
  ctx2d.font = `${fontSize}px 'DM Mono', monospace`;
  const tw = ctx2d.measureText(s.text).width, pad = 8;
  ctx2d.save();
  ctx2d.globalAlpha = alpha * 0.40;
  ctx2d.fillStyle = `hsl(${s.hue}, 40%, 12%)`;
  ctx2d.beginPath();
  ctx2d.roundRect(s.sx - tw/2 - pad, s.sy - fontSize + 2, tw + pad*2, fontSize + 6, 4);
  ctx2d.fill();
  ctx2d.globalAlpha = alpha;
  ctx2d.fillStyle = `hsl(${s.hue}, 65%, ${55 + depth*25}%)`;
  ctx2d.fillText(s.text, s.sx - tw/2, s.sy);
  ctx2d.restore();
}

function drawFrame(){
  ctxB.clearRect(0, 0, W, H);
  ctxF.clearRect(0, 0, W, H);
  if(!active || !spots.length) return;

  discoAngle += 0.0035;
  const r  = sphereR();
  const br = ballR();

  const projected = spots.map(s => {
    const p = project(s.theta0 + discoAngle, s.phi, r);
    return { ...s, ...p };
  });
  projected.sort((a, b) => a.z - b.z);

  projected.forEach(s => {
    const depth = (s.z + r) / (2 * r);
    if(depth < 0.06) return;

    /* distance from canvas centre */
    const dx = s.sx - CX, dy = s.sy - CY;
    const distFromCentre = Math.sqrt(dx*dx + dy*dy);

    /* spots closer than ball radius go on front canvas */
    if(distFromCentre < br * 1.1){
      drawSpot(ctxF, s, depth);
    } else {
      drawSpot(ctxB, s, depth);
    }
  });
}

(function loop(){ drawFrame(); requestAnimationFrame(loop); })();

/* ── language ── */
function applyLang(){
  if(!DATA) return;
  const d = DATA[lang];
  document.getElementById('hint').textContent          = d.hint;
  document.getElementById('lnk-contact').textContent   = d.menu.contact;
  document.getElementById('lnk-linkedin').textContent  = d.menu.linkedin;
  document.getElementById('lang-toggle').textContent   = d.menu.lang;
  document.getElementById('try-btn').textContent       = d.menu.try;
  buildSpots(d.reflections);
}

/* ── ball toggle (click + touch) ── */
const ball  = document.getElementById('ball');
const hint  = document.getElementById('hint');
 
/* ── SoundCloud Widget API ── */
let widget = null;
let scReady = false;

function initWidget() {
  const scFrame = document.getElementById('sc-player');
  widget = SC.Widget(scFrame);
  widget.bind(SC.Widget.Events.READY, () => {
    scReady = true;
    widget.setVolume(50); // 50%
  });
}

function toggleDisco(e) {
  e.preventDefault();
  active = !active;
  ball.classList.toggle('active', active);
  hint.classList.toggle('hidden', active);

  if (active) {
    if (scReady) {
      widget.seekTo(75000); // 1m15s in ms
      widget.setVolume(50);
      widget.play();
    }
  } else {
    if (scReady) widget.pause();
    discoAngle = 0;
    ctxB.clearRect(0, 0, W, H);
    ctxF.clearRect(0, 0, W, H);
    setTimeout(() => menu.classList.add('open'), 300);
  }
}
ball.addEventListener('click',      toggleDisco);
ball.addEventListener('touchend',   toggleDisco, { passive: false });

/* ── nav ── */
const toggle = document.getElementById('nav-toggle');
const menu   = document.getElementById('nav-menu');
function closeMenu(){ menu.classList.remove('open'); }
toggle.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('open'); });
document.addEventListener('click',    closeMenu);
document.addEventListener('touchend', closeMenu);

/* ── lang toggle ── */
document.getElementById('lang-toggle').addEventListener('click', e => {
  e.stopPropagation();
  lang = lang === 'en' ? 'no' : 'en';
  applyLang(); closeMenu();
});

/* ── try-it ── */
const tryOverlay = document.getElementById('try-overlay');
document.getElementById('try-btn').addEventListener('click', e => {
  e.stopPropagation(); tryOverlay.classList.add('open'); closeMenu();
});
document.getElementById('try-cancel').addEventListener('click', () => tryOverlay.classList.remove('open'));
tryOverlay.addEventListener('click', e => { if(e.target === tryOverlay) tryOverlay.classList.remove('open'); });
document.getElementById('try-apply').addEventListener('click', () => {
  const about  = document.getElementById('try-about').value.trim();
  const skills = document.getElementById('try-skills').value.trim();
  const items  = [];
  if(about) items.push(about);
  skills.split('\n').forEach(l => { const t = l.trim(); if(t) items.push(t); });
  if(items.length) buildSpots(items);
  /* swap profile photo to disco ball for the "try it" preview */
  const photo = document.getElementById('ball-photo');
  photo.src = document.getElementById('ball-disco').src;
  photo.style.borderRadius = '50%';
  photo.style.objectFit = 'contain';
  photo.style.background = '#111';
  tryOverlay.classList.remove('open');
});

/* ── boot ── */
fetch('cv-data.json').then(r => r.json()).then(data => {
  DATA = data;
  document.getElementById('lnk-linkedin').href = data.linkedin;
  applyLang();
}).catch(() => {
  DATA = {
    en: { hint:'click the disco ball', menu:{ contact:'✉ contact', linkedin:'⬡ linkedin', cv:'↓ download cv', lang:'🇳🇴 norsk', try:'✏ try it yourself' }, reflections:['✦ Product Designer','🚀 3+ yrs UX','💡 User Research','🎨 Figma','⚡ React','🌍 Oslo','📊 Data Viz','🤝 Team Lead','🏆 Award 2023','📱 Mobile Apps','🔧 Full-Stack','🎓 UiO','🌱 Sustainability','🎵 Music','📸 Photography','🧪 A/B Testing','🛠 Prototyping','💬 Copywriting'] },
    no: { hint:'klikk på diskoballen', menu:{ contact:'✉ kontakt', linkedin:'⬡ linkedin', cv:'↓ last ned CV', lang:'🇬🇧 english', try:'✏ prøv selv' }, reflections:['✦ Produktdesigner','🚀 3+ år UX','💡 Brukerundersøkelser','🎨 Figma','⚡ React','🌍 Oslo','📊 Datavisualisering','🤝 Teamleder','🏆 Pris 2023','📱 Mobilapper','🔧 Full-Stack','🎓 UiO','🌱 Bærekraft'    ] }
  };
  applyLang();
});
</script>
